# nginx proxy address - http://172.17.0.1:8080

name: hasura
x-logging: &default-logging
  options:
    max-size: '5m'
    max-file: '1'
  driver: json-file

services:
  app:
    image: hasura/graphql-engine:latest
    container_name: hasura-app
    hostname: ${BASE_HOST_NAME:-$HOSTNAME}
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      TZ: ${TZ:-America/New_York}
      HASURA_GRAPHQL_DATABASE_URL: postgresql://${DB_USER_NAME:-hasura}:${DB_USER_PASS:-changeme_db_password}@hasura-db:5432/${DB_CREATE_DATABASE_NAME:-hasura}
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_ADMIN_SECRET: ${APP_ADMIN_PASS:-changeme_admin_password}
      HASURA_GRAPHQL_JWT_SECRET: '{"type":"HS256","key":"${APP_SECRET_KEY:-changeme_secret_key_min_32_chars}"}'
      HASURA_GRAPHQL_METADATA_DATABASE_URL: postgresql://${DB_USER_NAME:-hasura}:${DB_USER_PASS:-changeme_db_password}@hasura-db:5432/${DB_CREATE_DATABASE_NAME:-hasura}
      HASURA_GRAPHQL_ENABLE_TELEMETRY: "false"
      CONTAINER_NAME: hasura-app
      HOSTNAME: ${BASE_HOST_NAME:-$HOSTNAME}
    ports:
      - '172.17.0.1:8080:8080'
    depends_on:
      hasura-db:
        condition: service_healthy
    networks:
      - hasura
      - proxy
      - cloudflare
    labels:
      - 'traefik.enable=true'
      - 'cloudflare.enable=true'
      - 'traefik.docker.network=proxy'
      - 'cloudflare.service=http://hasura-app:8080'
      - 'cloudflare.hostname=hasura.${CLOUDFLARE_ZONE_NAME:-}'
      - 'traefik.http.routers.hasura-app.entrypoints=http'
      - 'traefik.http.routers.hasura-app-secure.tls=true'
      - 'traefik.http.routers.hasura-app.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.middlewares.hasura-app-https-redirect.redirectscheme.scheme=https'
      - 'traefik.http.routers.hasura-app.middlewares=hasura-app-https-redirect'
      - 'traefik.http.routers.hasura-app-secure.entrypoints=https'
      - 'traefik.http.routers.hasura-app-secure.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.routers.hasura-app-secure.tls.certresolver=cloudflare'
      - 'traefik.http.routers.hasura-app-secure.service=hasura-app'
      - 'traefik.http.services.hasura-app.loadbalancer.server.port=8080'

  hasura-db:
    image: postgres:latest
    container_name: hasura-db
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      TZ: ${TZ:-America/New_York}
      POSTGRES_DB: ${DB_CREATE_DATABASE_NAME:-hasura}
      POSTGRES_USER: ${DB_USER_NAME:-hasura}
      POSTGRES_PASSWORD: ${DB_USER_PASS:-changeme_db_password}
      CONTAINER_NAME: hasura-db
    volumes:
      - './volumes/data/db/postgres/hasura:/var/lib/postgresql/data'
    networks:
      - hasura
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER_NAME:-hasura} -d ${DB_CREATE_DATABASE_NAME:-hasura}"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  hasura:
    name: hasura
    external: false
  proxy:
    external: true
  cloudflare:
    external: true
